{% extends 'layout.html' %}

{% block head %}
    <title>{{ designacao }} - Dicionário Médico</title>
{% endblock %}

{% block body %}
<div class="container py-5 mt-4 mb-5" style="max-width: 900px;">

    <nav aria-label="breadcrumb" class="mb-4">
      <ol class="breadcrumb bg-transparent p-0">
        <li class="breadcrumb-item"><a href="/" class="text-decoration-none text-muted">Início</a></li>
        <li class="breadcrumb-item"><a href="/conceitos" class="text-decoration-none text-muted">Conceitos A-Z</a></li>
        <li class="breadcrumb-item active fw-bold text-primary" aria-current="page">{{ designacao }}</li>
      </ol>
    </nav>

    <div class="card shadow border-0 rounded-4">
      <div class="card-body p-4 p-md-5">
        
        <div class="border-bottom pb-4 mb-4">
            <h1 class="display-5 fw-bold text-dark mb-0 d-inline-block me-3">
                {{ designacao }}
            </h1>
        </div>
        
        <div class="bg-light p-4 rounded-3 mb-5 border">
            <p class="fs-5 text-dark mb-0" style="line-height: 1.8;">
                {{ descricao }}
            </p>
        </div>

        <div class="d-flex flex-column flex-sm-row gap-2 mt-2">
            <a href="/conceitos" class="btn btn-primary rounded-pill px-4 fw-semibold d-flex align-items-center justify-content-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-left me-2" viewBox="0 0 16 16">
                  <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
                </svg>
                Voltar ao Índice A-Z
            </a>
            <a href="/" class="btn btn-outline-secondary rounded-pill px-4 fw-semibold d-flex align-items-center justify-content-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-house-door me-2" viewBox="0 0 16 16">
                  <path d="M8.354 1.146a.5.5 0 0 0-.708 0l-6 6A.5.5 0 0 0 1.5 7.5v7a.5.5 0 0 0 .5.5h4.5a.5.5 0 0 0 .5-.5v-4h2v4a.5.5 0 0 0 .5.5H14a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.146-.354L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293L8.354 1.146zM2.5 14V7.707l5.5-5.5 5.5 5.5V14H10v-4a.5.5 0 0 0-.5-.5h-3a.5.5 0 0 0-.5.5v4H2.5z"/>
                </svg>
                Página Inicial
            </a>
        </div>
        
      </div>
    </div>

</div>
{% endblock %}
